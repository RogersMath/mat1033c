<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>MAT1033C SLC Survival Guide</title>

  <!-- Google Fonts -->
  https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display:wght@400;700&family=Lato:wght@400;700&display=swap

  <!-- Stylesheet -->
  <link rel="stylesheet" href="./styles.css" />

  <!-- MathJax -->
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
</head>

<body>

  <!-- MENU OVERLAY (click to close) -->
  <div id="menuOverlay"></div>

  <!-- HEADER -->
  <header>
    <div id="hamburger" class="hamburger" aria-label="Menu" role="button">
      <span></span><span></span><span></span>
    </div>
    <h1>MAT1033C<br>SLC Survival Guide</h1>
  </header>

  <!-- SIDEMENU (filled dynamically by render.js) -->
  <nav id="sidemenu" class="side-menu" role="navigation"></nav>

  <!-- MAIN CONTENT (sections injected here) -->
  <main id="mainContent" role="main"></main>

  <!-- DETAIL PANEL (injected by detail.js / render.js) -->
  <div class="formula-detail">
    <button class="detail-back-btn" aria-label="Back">← Back</button>
    <div class="detail-inner"></div>
  </div>

  <!-- FOOTER -->
  <footer>
    <a href="https://pbsc.edu/slc/" target="_blank" rel="noopener">
      Want tutors to help you perform at your very best?<br>PBSC students click here
    </a>
  </footer>

  <!-- ENGINE + MODULES -->
  <script type="module">
    import Engine from './js/engine.js';
    import { initRender } from './js/ui/render.js';

    // Boot sequence:
    // 1. Engine loads course.json, language, etc.
    // 2. Render DOM sections from AppState
    // 3. Engine activates router + UI systems
    window.addEventListener('DOMContentLoaded', async () => {
      const AppState = await Engine.initApp();
      initRender(AppState);
    });
  </script>

</body>
</html>
